app-id: org.decred.Decrediton
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
# Provides zypak (Electron/Chromium sandbox helper) prebuilt and maintained.
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
default-branch: stable

command: decrediton

finish-args:
  # Windowing system.
  # Decrediton bundles Electron 26 (Chromium 116), which targets X11; on Wayland
  # sessions it runs via XWayland. Its CLI parser rejects unknown flags, so the
  # ozone platform is not forced here.
  - --socket=x11
  - --share=ipc
  # GPU acceleration + USB access for Trezor hardware wallets: Decrediton spawns
  # a bundled trezord-go, which needs the USB device nodes. Same permission as
  # the official Trezor Suite Flatpak (io.trezor.suite).
  - --device=all
  # Network access for blockchain sync / SPV peers
  - --share=network
  # Save exported transaction data (CSV) to the user's Downloads folder
  - --filesystem=xdg-download
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # Inhibit the screensaver during long-running operations
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.gnome.SessionManager

modules:
  - name: decrediton
    buildsystem: simple
    build-commands:
      # Extract the official AppImage
      - chmod +x decrediton.AppImage
      - ./decrediton.AppImage --appimage-extract

      # Install the unpacked Electron application
      - mkdir -p /app/lib/decrediton
      - cp -r squashfs-root/* /app/lib/decrediton/

      # Drop AppImage scaffolding, the setuid sandbox helper (zypak handles it),
      # and the duplicated icon tree (icons are installed separately below)
      - rm -rf /app/lib/decrediton/chrome-sandbox /app/lib/decrediton/AppRun /app/lib/decrediton/decrediton.desktop /app/lib/decrediton/decrediton.png /app/lib/decrediton/usr

      # Launcher: run the Electron binary through zypak
      - |
        cat > /app/bin/decrediton <<'EOF'
        #!/bin/sh
        export TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID"
        export DBUS_SYSTEM_BUS_ADDRESS=unix:path=/dev/null
        exec zypak-wrapper /app/lib/decrediton/decrediton "$@"
        EOF
      - chmod +x /app/bin/decrediton

      # Desktop integration files
      - install -Dm644 org.decred.Decrediton.svg /app/share/icons/hicolor/scalable/apps/org.decred.Decrediton.svg
      - install -Dm644 org.decred.Decrediton.desktop -t /app/share/applications/
      - install -Dm644 org.decred.Decrediton.metainfo.xml -t /app/share/metainfo/

    sources:
      - type: file
        url: https://github.com/decred/decred-binaries/releases/download/v2.1.5/decrediton-linux-amd64-v2.1.5.AppImage
        sha256: a8ab131b4d4eae78589b0fa82219205034b0b1fb0a10acaef3b53d12e63ad3bb
        dest-filename: decrediton.AppImage
        only-arches:
          - x86_64
        # Automated update detection via flatpak-external-data-checker.
        # is-main-source lets the checker also update the metainfo <release> entry.
        x-checker-data:
          type: json
          is-main-source: true
          url: https://api.github.com/repos/decred/decred-binaries/releases/latest
          version-query: .tag_name | ltrimstr("v")
          url-query: >-
            .assets[]
            | select(.name | test("^decrediton-linux-amd64-v.*\\.AppImage$"))
            | .browser_download_url
      - type: file
        path: org.decred.Decrediton.desktop
      - type: file
        path: org.decred.Decrediton.svg
      - type: file
        path: org.decred.Decrediton.metainfo.xml
